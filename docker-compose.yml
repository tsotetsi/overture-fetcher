services:
  overture-fetcher:
    build: .
    image: overture-fetcher
    volumes:
      - ./output:/output
    networks:
      - overture-network
    environment:
      - FETCH_SEGMENT=true
      - FETCH_DIVISIONS=true

  duck-ui:
    image: ghcr.io/ibero-data/duck-ui:latest
    ports:
      - "8080:5522"
    networks:
      - overture-network
    volumes:
      - ./output:/output
    environment:
      # If Duck-UI supports reading raw Parquet, this works. 
      # Otherwise, point it to a .db file if you save as one.
      - DUCKDB_DATABASE=/output/overture.db
    depends_on:
      overture-fetcher:
        condition: service_completed_successfully
        # Duck-UI needs the file to exist before it can read it.
        # condition: service_started

networks:
  overture-network:
    driver: bridge